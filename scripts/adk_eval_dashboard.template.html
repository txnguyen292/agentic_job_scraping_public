<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ADK Eval Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-adk-bg: #131316;
        --color-adk-rail: #1b191d;
        --color-adk-surface: #211f23;
        --color-adk-elevated: #29272b;
        --color-adk-line: #49454f;
        --color-adk-blue: #0b57d0;
        --color-adk-blue-text: #d3e3fd;
      }

      @layer components {
        .tw-focus-ring {
          @apply focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#a8c7fa] focus-visible:ring-offset-2 focus-visible:ring-offset-[#131316];
        }

        .tw-elevated {
          @apply shadow-[0_1px_2px_rgba(0,0,0,0.5),0_8px_22px_rgba(0,0,0,0.26)];
        }

        .tw-scrollbar {
          scrollbar-color: #5f6368 transparent;
          scrollbar-width: thin;
        }
      }
    </style>
    <style>
      :root {
        color-scheme: dark;
        --bg: #131316;
        --surface-low: #1b191d;
        --surface: #211f23;
        --surface-high: #29272b;
        --surface-selected: #1f3348;
        --ink: #e8eaed;
        --muted: #bdc1c6;
        --muted-soft: #9aa0a6;
        --line: #3c4043;
        --line-strong: #5f6368;
        --primary: #a8c7fa;
        --primary-container: #0b57d0;
        --primary-on-container: #d3e3fd;
        --error: #ffb4ab;
        --error-container: #5d1a1a;
        --success: #88d39f;
        --success-container: #143d27;
        --warning: #f1c66a;
        --warning-container: #4a3820;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 8px 22px rgba(0, 0, 0, 0.26);
        --shadow-soft: 0 1px 0 rgba(255, 255, 255, 0.03) inset;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(32, 33, 36, 0.42) 0, rgba(19, 19, 22, 0) 220px),
          var(--bg);
        color: var(--ink);
        font-family: "Google Sans", Roboto, "Helvetica Neue", Arial, ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0;
      }

      button,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      a:focus-visible,
      summary:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
        font-weight: 500;
        line-height: 1.25;
      }

      h2 {
        font-size: 18px;
        font-weight: 500;
        line-height: 1.3;
      }

      h3 {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.3;
      }

      .shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .rail {
        position: sticky;
        top: 0;
        height: 100vh;
        border-right: 1px solid rgba(95, 99, 104, 0.5);
        background: var(--surface-low);
        padding: 20px 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 54px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 14px;
        padding: 0 10px 16px;
      }

      .mark {
        display: inline-flex;
        width: 34px;
        height: 34px;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: var(--primary-container);
        color: var(--primary-on-container);
        font-weight: 800;
        box-shadow: var(--shadow-soft);
      }

      .rail-note {
        display: grid;
        gap: 8px;
        margin: 22px 4px 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        padding: 12px;
      }

      .nav {
        display: grid;
        gap: 6px;
      }

      .nav button {
        display: flex;
        width: 100%;
        min-height: 40px;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        font-weight: 500;
        padding: 0 12px 0 14px;
        text-align: left;
        transition: background 140ms ease, color 140ms ease;
      }

      .nav button:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
      }

      .nav button.is-active {
        background: var(--primary-container);
        color: var(--primary-on-container);
        font-weight: 700;
      }

      .nav-count {
        display: inline-flex;
        min-width: 24px;
        height: 22px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.09);
        color: currentColor;
        font-size: 11px;
        font-weight: 800;
        padding: 0 8px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(95, 99, 104, 0.56);
        background: rgba(19, 19, 22, 0.9);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        display: flex;
        min-height: 74px;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 28px;
      }

      main {
        padding: 22px 28px 48px;
      }

      .muted {
        color: var(--muted);
      }

      .microcopy {
        color: var(--muted);
        font-size: 12.5px;
        line-height: 1.4;
      }

      .label {
        color: var(--muted-soft);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .page {
        display: grid;
        gap: 18px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(180px, 1fr));
      }

      .workbench {
        grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
        align-items: start;
      }

      .trace-workbench {
        grid-template-columns: 300px minmax(300px, 430px) minmax(0, 1fr);
        align-items: start;
      }

      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        box-shadow: var(--shadow), var(--shadow-soft);
      }

      .panel {
        padding: 18px;
      }

      .card {
        display: grid;
        gap: 8px;
        padding: 16px;
      }

      .card-button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        color: inherit;
        padding: 14px;
        text-align: left;
        transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
      }

      .card-button:hover {
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.055);
      }

      .card-button.is-selected {
        border-color: var(--primary);
        background: var(--surface-selected);
        box-shadow: inset 3px 0 0 var(--primary);
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .split {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .big-number {
        font-size: 34px;
        font-weight: 700;
        line-height: 1;
      }

      .pill {
        display: inline-flex;
        min-height: 26px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.035);
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        padding: 0 10px;
        text-decoration: none;
        white-space: nowrap;
      }

      button.pill {
        transition: background 140ms ease, border-color 140ms ease;
      }

      button.pill:hover {
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.08);
      }

      .pill.pass {
        border-color: var(--success);
        background: var(--success-container);
        color: var(--success);
      }

      .pill.fail {
        border-color: var(--error);
        background: var(--error-container);
        color: var(--error);
      }

      .pill.warn {
        border-color: var(--warning);
        background: var(--warning-container);
        color: var(--warning);
      }

      .source-path {
        overflow-wrap: anywhere;
        color: var(--primary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.45;
      }

      pre {
        max-height: 460px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f1013;
        color: #f0edf1;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        margin: 0;
        padding: 12px;
        white-space: pre-wrap;
      }

      .structured-json {
        display: grid;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 16, 19, 0.72);
        padding: 12px;
      }

      .json-fields {
        display: grid;
        gap: 8px;
      }

      .json-field {
        display: grid;
        grid-template-columns: minmax(120px, 210px) minmax(0, 1fr);
        gap: 12px;
        border-top: 1px solid rgba(95, 99, 104, 0.45);
        padding-top: 8px;
      }

      .json-field:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .json-key {
        overflow-wrap: anywhere;
        color: var(--primary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .json-value {
        min-width: 0;
        overflow-wrap: anywhere;
        line-height: 1.45;
      }

      .json-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding-left: 18px;
      }

      .raw-details {
        display: grid;
        gap: 8px;
      }

      .raw-details summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .event-list {
        display: grid;
        gap: 8px;
        max-height: calc(100vh - 170px);
        overflow: auto;
        padding-right: 4px;
      }

      .event-button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        color: inherit;
        padding: 12px;
        text-align: left;
        transition: background 140ms ease, border-color 140ms ease;
      }

      .event-button:hover {
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.055);
      }

      .event-button.is-selected {
        border-color: var(--primary);
        background: var(--surface-selected);
        box-shadow: inset 3px 0 0 var(--primary);
      }

      .event-order {
        color: var(--primary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      .table-shell {
        max-width: 100%;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 16, 19, 0.38);
      }

      .table th,
      .table td {
        border-bottom: 1px solid var(--line);
        padding: 11px 10px;
        text-align: left;
        vertical-align: top;
      }

      .table th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #202124;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .table tbody tr:hover {
        background: rgba(255, 255, 255, 0.035);
      }

      .table tr:last-child td {
        border-bottom: 0;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 24px;
        text-align: center;
      }

      .list-control {
        border: 1px solid rgba(95, 99, 104, 0.55);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        padding: 8px 10px;
      }

      @media (max-width: 1100px) {
        .shell,
        .workbench,
        .trace-workbench {
          grid-template-columns: 1fr;
        }

        .rail {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .topbar {
          position: static;
        }
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 20px;
        }

        main,
        .topbar-inner {
          padding-left: 14px;
          padding-right: 14px;
        }

        .topbar-inner,
        .split {
          align-items: flex-start;
          flex-direction: column;
        }

        .metric-grid {
          grid-template-columns: 1fr;
        }

        .json-field {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-adk-bg text-[#e8eaed] antialiased">
    <div class="shell min-h-screen">
      <aside class="rail tw-scrollbar">
        <div class="brand">
          <span class="mark">A</span>
          <div>
            <h3>ADK Eval</h3>
            <p class="microcopy">Generated from eval result JSON</p>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="rail-note" id="rail-note"></div>
      </aside>
      <section>
        <header class="topbar tw-elevated">
          <div class="topbar-inner">
            <div>
              <h1 id="page-title">ADK Eval Dashboard</h1>
              <p class="microcopy" id="page-subtitle"></p>
            </div>
            <div class="row" id="top-actions"></div>
          </div>
        </header>
        <main id="app"></main>
      </section>
    </div>
    <script>
      window.__ADK_EVAL_DASHBOARD_DATA__ = __DASHBOARD_DATA__;

      const data = window.__ADK_EVAL_DASHBOARD_DATA__;
      const views = [
        ["overview", "Overview"],
        ["trace", "Trace"],
        ["rubrics", "Rubrics"],
        ["diagnosis", "Diagnosis"],
      ];
      const LIST_LIMIT = 5;
      const state = {
        view: "overview",
        runId: data.runs[0]?.id || "",
        eventId: "",
        expandedLists: {},
      };

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function jsonBlock(value) {
        const rendered = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        return `<pre class="tw-scrollbar">${esc(rendered)}</pre>`;
      }

      function looksJsonish(text) {
        const trimmed = String(text ?? "").trim();
        return ["{", "[", '"'].includes(trimmed.slice(0, 1));
      }

      function parseJsonishText(value) {
        if (typeof value !== "string") {
          return { ok: false, value };
        }
        let text = value.trim();
        if (!text || !looksJsonish(text)) {
          return { ok: false, value };
        }
        for (let index = 0; index < 3; index += 1) {
          try {
            const parsed = JSON.parse(text);
            if (typeof parsed === "string") {
              const nested = parsed.trim();
              if (nested && nested !== text && looksJsonish(nested)) {
                text = nested;
                continue;
              }
            }
            return { ok: true, value: parsed };
          } catch {
            return { ok: false, value };
          }
        }
        return { ok: false, value };
      }

      function contentText(content) {
        return (content?.parts || [])
          .map((part) => part.text)
          .filter(Boolean)
          .join("\n");
      }

      function renderPrimitiveValue(value) {
        if (value === null) return `<span class="muted">null</span>`;
        if (value === undefined) return `<span class="muted">undefined</span>`;
        if (typeof value === "boolean") return pill(String(value), value ? "pass" : "");
        if (typeof value === "number") return `<span>${esc(value)}</span>`;
        const text = String(value);
        if (!text) return `<span class="muted">empty string</span>`;
        return `<span>${esc(text)}</span>`;
      }

      function renderStructuredValue(value) {
        if (Array.isArray(value)) {
          if (!value.length) return `<span class="muted">empty array</span>`;
          return `<ol class="json-list">${value.map((item) => `<li>${renderStructuredValue(item)}</li>`).join("")}</ol>`;
        }
        if (value && typeof value === "object") {
          const entries = Object.entries(value);
          if (!entries.length) return `<span class="muted">empty object</span>`;
          return `
            <div class="json-fields">
              ${entries.map(([key, entryValue]) => `
                <div class="json-field">
                  <div class="json-key">${esc(key)}</div>
                  <div class="json-value">${renderStructuredValue(entryValue)}</div>
                </div>
              `).join("")}
            </div>
          `;
        }
        return renderPrimitiveValue(value);
      }

      function renderAdkTextValue(text, rawLabel = "Raw ADK output text") {
        const parsed = parseJsonishText(text);
        if (parsed.ok && parsed.value && typeof parsed.value === "object") {
          return `
            <div class="structured-json">
              ${renderStructuredValue(parsed.value)}
              <details class="raw-details">
                <summary>${esc(rawLabel)}</summary>
                ${jsonBlock(text)}
              </details>
            </div>
          `;
        }
        return jsonBlock(text || "No final response text in result.");
      }

      function renderFinalResponsePayload(payload) {
        const text = contentText(payload);
        if (!text) {
          return jsonBlock(payload);
        }
        return renderAdkTextValue(text, "Raw final_response text");
      }

      function renderFinalResponses(run) {
        const responses = run.invocations.filter((invocation) => invocation.final_response_text);
        if (!responses.length) {
          return `<div class="empty">No final response text in result.</div>`;
        }
        return responses.map((invocation, index) => `
          <article class="stack">
            ${responses.length > 1 ? `<div class="label">Invocation ${index + 1}</div>` : ""}
            ${renderAdkTextValue(invocation.final_response_text)}
          </article>
        `).join("");
      }

      function formatScore(value) {
        if (value === null || value === undefined) return "N/E";
        if (typeof value === "number") return value.toFixed(2);
        return String(value);
      }

      function pill(label, mode) {
        return `<span class="pill ${mode || ""}">${esc(label)}</span>`;
      }

      function statusMode(status) {
        if (status === "passed" || status === "success") return "pass";
        if (status === "not evaluated") return "warn";
        if (status === "failed" || status === "failure") return "fail";
        return "";
      }

      function metricMode(metric) {
        if (!metric) return "";
        if (metric.status === "not evaluated") return "warn";
        return metric.passed ? "pass" : "fail";
      }

      function renderJudgeCitations(citations) {
        const related = citations || [];
        const listId = `judge-citations:${related.map((item) => item.event_id).join(",")}`;
        const visibleRelated = limitedItems(listId, related);
        return `
          <section class="stack">
            <div class="label">Judge-cited trace anchors</div>
            ${
              related.length
                ? `<div class="stack">
                    ${renderListControl(listId, related.length, "judge citations")}
                    ${visibleRelated.map((item) => `
                      <button class="card-button tw-focus-ring" data-action="select-event" data-event-id="${esc(item.event_id)}">
                        <div class="row">
                          <span class="event-order">${String(item.order).padStart(2, "0")}</span>
                          ${pill(item.kind, "")}
                          ${item.status ? pill(item.status, statusMode(item.status)) : ""}
                        </div>
                        <h3>${esc(item.title)}</h3>
                        <p class="microcopy">${esc(item.reason)}</p>
                        <p class="microcopy">${esc(item.summary)}</p>
                      </button>
                    `).join("")}
                  </div>`
                : `<div class="empty">No judge-authored trace anchor was found in this rationale. Rerun with the citation-aware rubric prompt to populate this section.</div>`
            }
          </section>
        `;
      }

      function flagForRubric(run, rubric) {
        return (run.flags || []).find((flag) => flag.source_path === rubric.source_path);
      }

      function currentRun() {
        return data.runs.find((run) => run.id === state.runId) || data.runs[0];
      }

      function currentEvent(run) {
        if (!run) return null;
        return run.events.find((event) => event.event_id === state.eventId) ||
          run.events.find((event) => event.kind === "metric_result" && event.metric && !event.metric.passed) ||
          run.events[0];
      }

      function setHash() {
        history.replaceState(null, "", `#${state.view}`);
      }

      function readHash() {
        const raw = location.hash.replace(/^#/, "");
        if (views.some(([key]) => key === raw)) {
          state.view = raw;
        }
      }

      function renderNav() {
        const navCounts = {
          overview: data.run_count,
          trace: currentRun()?.events.length || 0,
          rubrics: data.clusters.rubric_clusters.length,
          diagnosis: data.clusters.metric_clusters.length,
        };
        document.getElementById("nav").innerHTML = views
          .map(([key, label]) => `
            <button class="tw-focus-ring ${state.view === key ? "is-active" : ""}" data-action="view" data-view="${key}">
              <span>${label}</span>
              <span class="nav-count">${esc(navCounts[key] ?? "")}</span>
            </button>
          `)
          .join("");
        document.getElementById("rail-note").innerHTML = `
          <div class="label">Current data</div>
          <p>${data.run_count} run(s)</p>
          <p>${data.source_files.length} result file(s)</p>
          <p>${esc(data.generated_at)}</p>
        `;
      }

      function renderTopbar(title, subtitle, actions = "") {
        document.getElementById("page-title").textContent = title;
        document.getElementById("page-subtitle").textContent = subtitle;
        document.getElementById("top-actions").innerHTML = actions;
      }

      function metricChips(run) {
        return run.metrics
          .map((metric) => pill(`${metric.metric_name}: ${formatScore(metric.score)}`, metricMode(metric)))
          .join("");
      }

      function isListExpanded(listId) {
        return Boolean(state.expandedLists[listId]);
      }

      function limitedItems(listId, items, limit = LIST_LIMIT) {
        return isListExpanded(listId) ? items : items.slice(0, limit);
      }

      function renderListControl(listId, total, noun = "items", limit = LIST_LIMIT) {
        if (total <= limit) {
          return "";
        }
        const expanded = isListExpanded(listId);
        const hiddenCount = total - limit;
        return `
          <div class="list-control split">
            <p class="microcopy">
              ${expanded ? `Showing all ${total} ${noun}.` : `Showing ${limit} of ${total}; ${hiddenCount} hidden.`}
            </p>
            <button class="pill tw-focus-ring" data-action="toggle-list" data-list-id="${esc(listId)}">
              ${expanded ? `Show first ${limit}` : `Show all ${total}`}
            </button>
          </div>
        `;
      }

      function renderRunCards({ compact = false } = {}) {
        return limitedItems("runs", data.runs).map((item) => `
          <button class="card-button tw-focus-ring ${item.id === state.runId ? "is-selected" : ""}" data-action="select-run" data-run-id="${esc(item.id)}">
            <div class="split">
              ${compact
                ? `<h3>${esc(item.short_id)}</h3>`
                : `<div>
                    <h3>${esc(item.short_id)}</h3>
                    <p class="microcopy">${esc(item.eval_id)}</p>
                  </div>`
              }
              ${pill(item.status, statusMode(item.status))}
            </div>
            ${compact ? "" : `<div class="row">${metricChips(item)}</div>`}
            <p class="microcopy">
              ${compact
                ? `${item.trace_summary.flag_count} flagged / ${item.trace_summary.event_count} events`
                : `${item.trace_summary.flag_count} flagged item(s) / ${item.trace_summary.event_count} trace event(s)`}
            </p>
          </button>
        `).join("");
      }

      function renderOverview() {
        const run = currentRun();
        renderTopbar(
          "ADK Eval Overview",
          "Run scoreboard, selected trace summary, and source files parsed from ADK eval output.",
          run ? `<button class="pill tw-focus-ring" data-action="open-trace" data-run-id="${esc(run.id)}">Open Trace for ${esc(run.short_id)}</button>` : ""
        );

        const overviewMetricListId = "overview-metrics";
        const metricCards = limitedItems(overviewMetricListId, data.clusters.metric_clusters).map((cluster) => {
          const failed = cluster.failed_count;
          const mode = cluster.not_evaluated_count ? "warn" : failed ? "fail" : "pass";
          return `
            <article class="card">
              <div class="label">${esc(cluster.metric_name)}</div>
              <div class="big-number">${esc(failed)} / ${esc(cluster.run_count)}</div>
              <p class="microcopy">failed or not passing across parsed runs</p>
              <div class="row">
                ${pill(`avg ${formatScore(cluster.average_score)}`, mode)}
                ${pill(`N/E ${cluster.not_evaluated_count}`, cluster.not_evaluated_count ? "warn" : "")}
              </div>
            </article>
          `;
        }).join("");

        const runList = renderRunCards();

        const selected = run ? `
          <section class="panel stack">
            <div class="split">
              <div>
                <div class="label">Selected run</div>
                <h2>${esc(run.short_id)}</h2>
              </div>
              ${pill(run.status, statusMode(run.status))}
            </div>
            <div class="source-path">${esc(run.source_file)}</div>
            <div class="row">${metricChips(run)}</div>
            <section class="grid metric-grid">
              <article class="card">
                <div class="label">Trace events</div>
                <div class="big-number">${run.trace_summary.event_count}</div>
                <p class="microcopy">${run.trace_summary.agent_event_count} agent event(s), ${run.trace_summary.metric_event_count} metric event(s)</p>
              </article>
              <article class="card">
                <div class="label">Flags</div>
                <div class="big-number">${run.trace_summary.flag_count}</div>
                <p class="microcopy">${esc(run.trace_summary.failed_rubrics.join(", ") || "No failed rubrics")}</p>
              </article>
              <article class="card">
                <div class="label">N/E metrics</div>
                <div class="big-number">${run.trace_summary.not_evaluated_metrics.length}</div>
                <p class="microcopy">${esc(run.trace_summary.not_evaluated_metrics.join(", ") || "None")}</p>
              </article>
              <article class="card">
                <div class="label">Tool calls</div>
                <div class="big-number">${Object.values(run.trace_summary.tool_call_counts).reduce((a, b) => a + b, 0)}</div>
                <p class="microcopy">${esc(Object.keys(run.trace_summary.tool_call_counts).slice(0, 4).join(", ") || "None")}</p>
              </article>
            </section>
            <div class="stack">
              <div class="label">Final response from ADK output</div>
              ${renderFinalResponses(run)}
            </div>
          </section>
        ` : `<div class="empty">No ADK eval runs found.</div>`;

        document.getElementById("app").innerHTML = `
          <section class="page">
            ${renderListControl(overviewMetricListId, data.clusters.metric_clusters.length, "metric cards")}
            <div class="grid metric-grid">${metricCards || `<div class="empty">No metrics found.</div>`}</div>
            <div class="grid workbench">
              <section class="panel stack">
                <div class="split">
                  <h2>Runs</h2>
                  ${pill(isListExpanded("runs") ? `${data.run_count} total` : `latest ${Math.min(LIST_LIMIT, data.run_count)}`, "")}
                </div>
                ${renderListControl("runs", data.run_count, "runs")}
                <div class="stack">${runList || `<div class="empty">No runs parsed.</div>`}</div>
              </section>
              ${selected}
            </div>
          </section>
        `;
      }

      function renderTrace() {
        const run = currentRun();
        const event = currentEvent(run);
        if (run && event) state.eventId = event.event_id;
        renderTopbar(
          "Trace",
          "Chronological ADK invocation events plus metric result events from the selected run.",
          run ? `<button class="pill tw-focus-ring" data-action="view" data-view="overview">Back to Overview</button>` : ""
        );
        if (!run) {
          document.getElementById("app").innerHTML = `<div class="empty">No trace data found.</div>`;
          return;
        }

        const runs = renderRunCards({ compact: true });
        const eventListId = `events:${run.id}`;

        const events = limitedItems(eventListId, run.events).map((item) => `
          <button class="event-button tw-focus-ring ${item.event_id === state.eventId ? "is-selected" : ""}" data-action="select-event" data-event-id="${esc(item.event_id)}">
            <div class="row">
              <span class="event-order">${String(item.order).padStart(2, "0")}</span>
              ${pill(item.kind, "")}
              ${item.status ? pill(item.status, statusMode(item.status)) : ""}
            </div>
            <h3>${esc(item.title)}</h3>
            <p class="microcopy">${esc(item.summary)}</p>
          </button>
        `).join("");

        const metricDetails = event?.metric ? `
          <section class="stack">
            <div class="label">Metric details</div>
            <div class="row">
              ${pill(event.metric.metric_name, metricMode(event.metric))}
              ${pill(`score ${formatScore(event.metric.score)}`, metricMode(event.metric))}
              ${pill(`threshold ${formatScore(event.metric.threshold)}`, "")}
            </div>
            ${
              event.metric.rubric_scores.length
                ? event.metric.rubric_scores.map((rubric) => `
                    <article class="card">
                      <div class="split">
                        <h3>${esc(rubric.rubric_id)}</h3>
                        ${pill(formatScore(rubric.score), rubric.passed ? "pass" : "fail")}
                      </div>
                      ${rubric.rubric_text ? `<p class="microcopy">${esc(rubric.rubric_text)}</p>` : ""}
                      ${rubric.rationale ? `<p>${esc(rubric.rationale)}</p>` : `<p class="microcopy">No rationale field present in ADK output.</p>`}
                      ${renderJudgeCitations(flagForRubric(run, rubric)?.judge_citations)}
                      <div class="source-path">${esc(rubric.source_path)}</div>
                    </article>
                  `).join("")
                : `<div class="empty">No rubric_scores field was present for this metric result.</div>`
            }
          </section>
        ` : "";

        const detail = event ? `
          <section class="panel stack">
            <div class="split">
              <div>
                <div class="label">Event ${String(event.order).padStart(2, "0")}</div>
                <h2>${esc(event.title)}</h2>
              </div>
              ${event.status ? pill(event.status, statusMode(event.status)) : ""}
            </div>
            <p class="microcopy">${esc(event.kind)}</p>
            <div class="source-path">${esc(event.source_path)}</div>
            ${metricDetails}
            <section class="stack">
              <div class="label">Payload from ADK output</div>
              ${event.kind === "final_response" ? renderFinalResponsePayload(event.payload) : jsonBlock(event.payload)}
            </section>
          </section>
        ` : `<div class="empty">Select an event.</div>`;

        document.getElementById("app").innerHTML = `
          <section class="grid trace-workbench">
            <section class="panel stack">
              <div class="split">
                <h2>Runs</h2>
                ${pill(isListExpanded("runs") ? `${data.run_count}` : `${Math.min(LIST_LIMIT, data.run_count)} recent`, "")}
              </div>
              ${renderListControl("runs", data.run_count, "runs")}
              <div class="stack">${runs}</div>
            </section>
            <section class="panel stack">
              <div class="split">
                <h2>Events</h2>
                ${pill(isListExpanded(eventListId) ? `${run.events.length}` : `${Math.min(LIST_LIMIT, run.events.length)} shown`, "")}
              </div>
              ${renderListControl(eventListId, run.events.length, "events")}
              <div class="event-list tw-scrollbar">${events}</div>
            </section>
            ${detail}
          </section>
        `;
      }

      function renderRubrics() {
        renderTopbar("Rubrics", "Judge rubric scores and rationales parsed from ADK metric results.");
        const rubricListId = "rubric-clusters";
        const clusters = limitedItems(rubricListId, data.clusters.rubric_clusters).map((cluster) => {
          const clusterRunListId = `rubric-runs:${cluster.source_key}`;
          const rows = limitedItems(clusterRunListId, cluster.runs).map((run) => `
            <tr>
              <td><button class="pill tw-focus-ring" data-action="select-run-trace" data-run-id="${esc(run.run_id)}">${esc(run.short_id)}</button></td>
              <td>${esc(formatScore(run.score))}</td>
              <td>
                <div class="stack">
                  <p>${esc(run.rationale || run.status || "No rationale field present in ADK output.")}</p>
                  ${renderJudgeCitations(run.judge_citations)}
                </div>
              </td>
              <td><span class="source-path">${esc(run.source_path)}</span></td>
            </tr>
          `).join("");
          return `
            <article class="panel stack">
              <div class="split">
                <div>
                  <div class="label">${esc(cluster.metric_name)}</div>
                  <h2>${esc(cluster.rubric_id || cluster.metric_name)}</h2>
                </div>
                ${pill(`${cluster.occurrence_count} run(s)`, cluster.type === "metric" ? "warn" : "fail")}
              </div>
              ${renderListControl(clusterRunListId, cluster.runs.length, "runs")}
              <div class="table-shell tw-scrollbar">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Run</th>
                      <th>Score</th>
                      <th>Judge rationale</th>
                      <th>Source</th>
                    </tr>
                  </thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            </article>
          `;
        }).join("");
        document.getElementById("app").innerHTML = `
          <section class="page">
            ${renderListControl(rubricListId, data.clusters.rubric_clusters.length, "rubric groups")}
            ${clusters || `<div class="empty">No failed rubric or metric flags were parsed.</div>`}
          </section>
        `;
      }

      function renderDiagnosis() {
        renderTopbar("Diagnosis", "Failure distribution by metric, run, and ADK source path.");
        const diagnosisMetricListId = "diagnosis-metrics";
        const metricRows = limitedItems(diagnosisMetricListId, data.clusters.metric_clusters).map((cluster) => `
          <tr>
            <td>${esc(cluster.metric_name)}</td>
            <td>${esc(cluster.failed_count)} / ${esc(cluster.run_count)}</td>
            <td>${esc(cluster.not_evaluated_count)}</td>
            <td>${esc(formatScore(cluster.average_score))}</td>
            <td>${esc(formatScore(cluster.threshold))}</td>
          </tr>
        `).join("");
        const diagnosisRunListId = "diagnosis-runs";
        const diagnosisRuns = [...data.runs].sort((a, b) => b.trace_summary.flag_count - a.trace_summary.flag_count);
        const runRows = limitedItems(diagnosisRunListId, diagnosisRuns).map((run) => `
          <tr>
            <td><button class="pill tw-focus-ring" data-action="select-run-trace" data-run-id="${esc(run.id)}">${esc(run.short_id)}</button></td>
            <td>${esc(run.eval_id)}</td>
            <td>${esc(run.trace_summary.flag_count)}</td>
            <td>${esc(run.trace_summary.not_evaluated_metrics.join(", ") || "None")}</td>
            <td><span class="source-path">${esc(run.source_file)}</span></td>
          </tr>
        `).join("");
        document.getElementById("app").innerHTML = `
          <section class="page">
            <section class="panel stack">
              <div class="split">
                <h2>Metric bottlenecks</h2>
                ${pill(isListExpanded(diagnosisMetricListId) ? `${data.clusters.metric_clusters.length}` : `${Math.min(LIST_LIMIT, data.clusters.metric_clusters.length)} shown`, "")}
              </div>
              ${renderListControl(diagnosisMetricListId, data.clusters.metric_clusters.length, "metrics")}
              <div class="table-shell tw-scrollbar">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Metric</th>
                      <th>Failed</th>
                      <th>N/E</th>
                      <th>Avg score</th>
                      <th>Threshold</th>
                    </tr>
                  </thead>
                  <tbody>${metricRows}</tbody>
                </table>
              </div>
            </section>
            <section class="panel stack">
              <div class="split">
                <h2>Runs by flagged count</h2>
                ${pill(isListExpanded(diagnosisRunListId) ? `${diagnosisRuns.length}` : `${Math.min(LIST_LIMIT, diagnosisRuns.length)} shown`, "")}
              </div>
              ${renderListControl(diagnosisRunListId, diagnosisRuns.length, "runs")}
              <div class="table-shell tw-scrollbar">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Run</th>
                      <th>Eval</th>
                      <th>Flags</th>
                      <th>N/E metrics</th>
                      <th>Source file</th>
                    </tr>
                  </thead>
                  <tbody>${runRows}</tbody>
                </table>
              </div>
            </section>
          </section>
        `;
      }

      function render() {
        if (!data.runs.some((run) => run.id === state.runId)) {
          state.runId = data.runs[0]?.id || "";
        }
        renderNav();
        setHash();
        if (state.view === "trace") renderTrace();
        else if (state.view === "rubrics") renderRubrics();
        else if (state.view === "diagnosis") renderDiagnosis();
        else renderOverview();
      }

      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-action]");
        if (!button) return;
        const action = button.getAttribute("data-action");
        if (action === "view") {
          state.view = button.getAttribute("data-view");
        }
        if (action === "select-run") {
          state.runId = button.getAttribute("data-run-id");
          state.eventId = "";
        }
        if (action === "toggle-list") {
          const listId = button.getAttribute("data-list-id");
          state.expandedLists[listId] = !state.expandedLists[listId];
          if (listId === "runs" && !state.expandedLists[listId] && !data.runs.slice(0, LIST_LIMIT).some((run) => run.id === state.runId)) {
            state.runId = data.runs[0]?.id || "";
            state.eventId = "";
          }
        }
        if (action === "open-trace" || action === "select-run-trace") {
          state.runId = button.getAttribute("data-run-id");
          state.view = "trace";
          state.expandedLists.runs = true;
          state.eventId = "";
        }
        if (action === "select-event") {
          state.eventId = button.getAttribute("data-event-id");
          const eventRunId = state.eventId.replace(/:event:\d+$/, "");
          if (data.runs.some((run) => run.id === eventRunId)) {
            state.runId = eventRunId;
          }
          state.view = "trace";
        }
        render();
      });

      window.addEventListener("hashchange", () => {
        readHash();
        render();
      });

      readHash();
      render();
    </script>
  </body>
</html>
